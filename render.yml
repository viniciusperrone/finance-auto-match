services:
  - type: web
    name: finance-auto-match
    runtime: python
    buildCommand: ".build/prod.sh"
    startCommand: "gunicorn core.wsgi:application"

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.prod

      - key: DEBUG
        value: "False"

      - key: PYTHON_VERSION
        value: "3.13"

      - key: SECRET_KEY
        generateValue: true
